<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adopt Me</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

.container{
width:500px;
margin:auto;
margin-top:40px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

label{
font-weight:bold;
}

input, textarea, select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:10px;
width:100%;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

.footer{
text-align:center;
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>Dog Adoption Form</h1>

<form>

<h3>Personal Information</h3>

<label>Full Name</label>
<input type="text" required>

<label>Phone Number</label>
<input type="tel" required>

<label>Email</label>
<input type="email" required>

<label>Address</label>
<textarea rows="4"></textarea>

<h3>Living Environment</h3>

<label>Residence Type</label>
<select>
<option>บ้านสวน</option>
<option>บ้านเดี่ยว</option>
<option>บ้านทาวน์โฮม</option>
<option>คอนโด/หอพัก</option>
</select>

<label>Where will the dog live?</label>

<input type="radio" name="place"> Inside the house
<br>
<input type="radio" name="place"> Outside the house
<br><br>

<label>Number of pets you currently have</label>
<input type="number" min="0">

<br>

<input type="checkbox" required>
I understand that submitting this form does not guarantee adoption.

<br><br>

<button type="submit">Submit</button>

</form>

</div>

<div class="footer">
650xxxxxxx Thammanit Chai
</div>

</body>
</html>
